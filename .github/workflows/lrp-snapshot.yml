name: LRP price snapshot

# Parses the USDA RMA Livestock Risk Protection (LRP) coverage-price report and upserts
# one headline snapshot into Supabase (public.lrp_price_snapshots); the dashboard's
# Markets card only READS that snapshot.
#
# SCHEDULED RUN DISABLED. RMA blocks GitHub's (Azure) runner IPs at the CONNECTION layer —
# the seed threw "fetch failed" with no HTTP status on two identical runs (a network/ASN
# block, not a catchable 403). No CI-side fix reaches RMA. The durable daily refresh now
# runs from PK's Mac via launchd (deploy/com.dryline.lrp-snapshot.plist, weekdays 16:30 MT),
# on a residential IP RMA actually serves. We KEEP workflow_dispatch below so this can still
# be hand-triggered IF a residential/proxy egress is ever wired into CI; until then a manual
# run just fails "fetch failed", same as the schedule did.
#
# What it writes (when it can reach RMA): ONE Montana national LRP snapshot (Feeder Cattle
# · Steers Weight 2), idempotent upsert on the natural key (commodity, lrp_type, state,
# effective_date). LRP coverage prices are national, so the MT snapshot is the national
# figure (the card frames it as the CME national index floor, not local cash). If a refresh
# is missed, the card flags the snapshot STALE after 7 days (lib/lrp-service.ts) and labels
# it with its real effective_date, so a gap degrades honestly rather than lying.

on:
  # schedule: REMOVED — RMA blocks GitHub-runner IPs (see header); the cron only failed red
  # every weekday. The launchd agent on PK's Mac is the real schedule now.
  workflow_dispatch: {}   # kept: hand-triggerable if a residential egress is ever wired in

# Avoid overlapping runs clobbering each other.
concurrency:
  group: lrp-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch + parse + upsert LRP snapshot
        env:
          # Maps the existing SUPABASE_URL secret to NEXT_PUBLIC_SUPABASE_URL — the env
          # name scripts/lrp-snapshot.ts actually reads (locally it comes from .env.local;
          # in CI there's no .env file, so we supply it under that exact name).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/lrp-snapshot.ts   # no CLI arg → newest effective date
