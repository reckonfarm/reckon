name: PRISM ingest

# Fetches RAW PRISM monthly precip (last complete Apr–Jun) + the matching 1991–2020
# monthly precip NORMALS from GitHub's runners (kept off Vercel's egress like the
# other snapshot jobs), clips each grid to the 5-state Northern Plains bbox, and
# upserts the raw clipped grid into Supabase (public.prism_grid_raw). NOTHING reads
# that table yet — Phase A step 2 of the Hay Opportunity Score, data layer only.
#
# Idempotent on the grid key; already-stored grids are SKIPPED — PRISM allows a file
# to be downloaded only twice per 24h, so there is no same-day retry.

on:
  schedule:
    # Weekly (Mondays 16:00 UTC) — the score is in-season and rolling: PRISM revises the
    # current provisional months and releases new ones through the season, so we re-run weekly.
    - cron: '0 16 * * 1'
  workflow_dispatch: {}   # manual trigger (used to seed immediately)

# Avoid overlapping runs clobbering each other.
concurrency:
  group: prism-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Fetch + clip + upsert PRISM precip & normals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/prism-ingest.ts
      # Sibling step: zonal aggregation over the grids just stored → one precip
      # percent-of-normal per county into public.hay_score_inputs (Phase A step 3).
      - name: Aggregate grids → percent-of-normal per county
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/prism-aggregate.ts
      # Sibling step: starting-condition ceiling C (reads the GDD spine's green-up date +
      # USDM-at-green-up + antecedent) → ceiling_c on hay_score_inputs (Phase B Commit 7b).
      - name: Compute starting-condition ceiling C
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/prism-ceiling.ts
      # Sibling step: precip score × ceiling C → final, snapshot into public.hay_score.
      - name: Score percent-of-normal → hay_score snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/prism-score.ts
