<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1B4332"/>

  <!-- Subtle texture: faint grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#FDFBF7" stroke-width="0.5" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#FDFBF7" stroke-width="0.5" opacity="0.06"/>

  <!-- Wordmark -->
  <text
    x="600" y="295"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="144"
    font-weight="700"
    fill="#FDFBF7"
    text-anchor="middle"
    letter-spacing="-2"
  >Reckon</text>

  <!-- Divider -->
  <line x1="480" y1="328" x2="720" y2="328" stroke="#FDFBF7" stroke-width="1.5" opacity="0.35"/>

  <!-- Tagline -->
  <text
    x="600" y="375"
    font-family="Arial, Helvetica, sans-serif"
    font-size="30"
    fill="#FDFBF7"
    text-anchor="middle"
    opacity="0.75"
    letter-spacing="0.5"
  >Know your drought. Know your programs.</text>

  <!-- Domain -->
  <text
    x="600" y="430"
    font-family="Arial, Helvetica, sans-serif"
    font-size="20"
    fill="#FDFBF7"
    text-anchor="middle"
    opacity="0.35"
    letter-spacing="1"
  >reckon.farm</text>
</svg>
